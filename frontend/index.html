<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Hub - Premium Shopping</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <h1 class="logo">Lumina.</h1>
            <ul class="nav-links">
                <li><a href="#" id="navLine" class="active">Home</a></li>
                <li><a href="#" id="navProducts">Products</a></li>
            </ul>
            <div class="nav-actions">
                <div class="cart-icon" id="cartBtn">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="cart-badge" id="cartBadge">0</span>
                </div>
                <button class="btn-primary" id="loginBtn">Login / Sign Up</button>
                <div class="user-menu hidden" id="userMenu">
                    <button class="btn-ghost" id="ordersBtn"><i class="fa-solid fa-box"></i> Orders</button>
                    <button class="btn-ghost" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="heroSection">
        <div class="hero-content">
            <h1 class="hero-title">Experience the Future of <span class="gradient-text">Shopping</span></h1>
            <p class="hero-subtitle">Discover premium products carefully curated for your lifestyle.</p>
            <button class="btn-primary btn-large" id="heroShopNowBtn">Shop Now <i class="fa-solid fa-arrow-right"></i></button>
        </div>
        <div class="hero-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="container hidden" id="productsSection">
        <div class="section-header">
            <h2>Our Collection</h2>
            <div class="filters">
                <button class="btn-ghost hidden" id="addProductBtn"><i class="fa-solid fa-plus"></i> Add Product</button>
                <input type="text" id="searchInput" placeholder="Search products..." class="search-input">
            </div>
        </div>
        <div class="products-grid" id="productsGrid">
            <!-- Products will be dynamically injected here -->
            <div class="loading-spinner"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
        </div>
    </main>

    <!-- Modals -->
    <!-- Cart Modal -->
    <div class="modal overlay hidden" id="cartModal">
        <div class="modal-content cart-modal-content">
            <div class="modal-header">
                <h2>Your Cart</h2>
                <button class="close-btn" id="closeCartBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body" id="cartItems">
                <!-- Cart items will be injected here -->
            </div>
            <div class="modal-footer hidden" id="cartFooter">
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cartTotalAmount">$0.00</span>
                </div>
                <button class="btn-primary btn-block" id="checkoutBtn">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="modal overlay hidden" id="authModal">
        <div class="modal-content auth-modal-content">
            <div class="modal-header">
                <h2 id="authTitle">Welcome Back</h2>
                <button class="close-btn" id="closeAuthBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="authForm">
                    <div class="form-group" id="emailGroup">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    <div class="error-msg" id="authError"></div>
                    <button type="submit" class="btn-primary btn-block" id="authSubmitBtn">Login</button>
                </form>
                <div class="auth-toggle">
                    <p id="authToggleText">Don't have an account? <a href="#" id="toggleAuthBtn">Sign up</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Orders Modal -->
    <div class="modal overlay hidden" id="ordersModal">
        <div class="modal-content orders-modal-content">
            <div class="modal-header">
                <h2>Order History</h2>
                <button class="close-btn" id="closeOrdersBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body" id="ordersList">
                <!-- Orders will be injected here -->
                <div class="loading-spinner"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
            </div>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div class="modal overlay hidden" id="addProductModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Product</h2>
                <button class="close-btn" id="closeAddProductBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="addProductForm">
                    <div class="form-group">
                        <label for="prodName">Name</label>
                        <input type="text" id="prodName" placeholder="Product name" required>
                    </div>
                    <div class="form-group">
                        <label for="prodPrice">Price ($)</label>
                        <input type="number" step="0.01" id="prodPrice" placeholder="Product price" required>
                    </div>
                    <div class="form-group">
                        <label for="prodCategory">Category</label>
                        <input type="text" id="prodCategory" placeholder="Product category" required>
                    </div>
                    <button type="submit" class="btn-primary btn-block" id="submitProductBtn">Create Product</button>
                </form>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="/api.js"></script>
    <script src="/app.js"></script>
</body>
</html>
